spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agenda_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# JWT Configuration (if using JWT instead of basic auth)
app:
  jwt:
    secret: mangati-agenda-secret-key-2026
    expiration: 86400000 # 24 hours in milliseconds