version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: agenda-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: agenda_db
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: agenda_user
      MYSQL_PASSWORD: agenda_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  agenda-api:
    build: .
    container_name: agenda-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/agenda_db
      SPRING_DATASOURCE_USERNAME: agenda_user
      SPRING_DATASOURCE_PASSWORD: agenda_pass
    depends_on:
      - mysql

volumes:
  mysql_data: